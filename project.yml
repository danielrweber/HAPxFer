name: HAPxFer
options:
  bundleIdPrefix: com.hapxfer
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40.0"

targets:
  HAPxFer:
    type: application
    platform: macOS
    sources:
      - path: HAPxFer
        excludes:
          - "SMBCModule/**"
    settings:
      base:
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: HAPxFer/Info.plist
        CODE_SIGN_ENTITLEMENTS: HAPxFer/HAPxFer.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.hapxfer.HAPxFer
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "HAPxFer needs local network access to discover and transfer files to your Sony HAP-Z1ES player."
        SWIFT_OBJC_BRIDGING_HEADER: HAPxFer/SMBCModule/HAPxFer-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - /opt/homebrew/include
        LIBRARY_SEARCH_PATHS:
          - /opt/homebrew/lib
        OTHER_LDFLAGS:
          - -lsmbclient
          - -L/opt/homebrew/lib
          - -rpath
          - /opt/homebrew/lib
