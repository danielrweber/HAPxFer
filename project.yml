name: HAPxFer
options:
  bundleIdPrefix: com.hapxfer
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40.0"

targets:
  HAPxFer:
    type: application
    platform: macOS
    sources:
      - path: HAPxFer
        excludes:
          - "SMBCModule/**"
    settings:
      base:
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: HAPxFer/Info.plist
        CODE_SIGN_ENTITLEMENTS: HAPxFer/HAPxFer.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.hapxfer.HAPxFer
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "HAPxFer needs local network access to discover and transfer files to your Sony HAP-Z1ES player."
        SWIFT_OBJC_BRIDGING_HEADER: HAPxFer/SMBCModule/HAPxFer-Bridging-Header.h
        ARCHS: "arm64 x86_64"
        ONLY_ACTIVE_ARCH: "NO"
        HEADER_SEARCH_PATHS:
          - /opt/homebrew/include
          - "$(PROJECT_DIR)/Frameworks/include"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Frameworks"
        OTHER_LDFLAGS:
          - -lsmbclient
          - "-L$(PROJECT_DIR)/Frameworks"
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
      config:
        Debug:
          ONLY_ACTIVE_ARCH: "YES"
    postCompileScripts:
      - name: "Embed Samba Frameworks"
        script: |
          FWDIR="${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}"
          mkdir -p "${FWDIR}"
          # Remove existing dylibs first to avoid permission issues on overwrite
          rm -f "${FWDIR}/"*.dylib 2>/dev/null || true
          cp "${PROJECT_DIR}/Frameworks/"*.dylib "${FWDIR}/"
          chmod u+w "${FWDIR}/"*.dylib
        basedOnDependencyAnalysis: false
